services:
  db:
    image: postgres
    restart: always
    shm_size: 128mb   # set shared memory limit
    environment:
      POSTGRES_DB: madness-list-node
      POSTGRES_PASSWORD: dev_pass
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql
  cache:
    image: redis:8.6.1
    restart: always
    environment:
      - REDIS_PASSWORD=dev_pass
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning